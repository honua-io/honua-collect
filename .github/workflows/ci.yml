name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The Honua.Sdk.* packages come from the private github-honua feed.
      - name: Authenticate package feed
        run: >-
          dotnet nuget update source github-honua
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile NuGet.config

      # Coverage gate: coverlet (MSBuild integration) collects line + branch
      # coverage and FAILS the build below the threshold. The per-type list maps
      # positionally to ThresholdType (line, then branch); commas inside an
      # MSBuild property value must be escaped as %2c. Thresholds are pinned
      # at-or-below current coverage so they gate regressions without flapping.
      # Core is well-covered (line ~94% / branch ~86%), so it gates at 85/65.
      - name: Build + test Core (with coverage gate)
        run: >-
          dotnet test tests/Honua.Collect.Core.Tests/Honua.Collect.Core.Tests.csproj
          -c Release --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:Threshold=85%2c65
          /p:ThresholdType=line%2cbranch
          /p:ThresholdStat=total
          /p:CoverletOutputFormat=cobertura

      # Presentation (view models). The raw number is diluted by Core types that
      # are transitively included in the coverage run, so we scope coverlet to the
      # Presentation assembly with /p:Include — that makes the figure honest
      # (line ~94% / branch ~77%). The gate pins just below current so further
      # regressions fail CI while leaving headroom as more view-model tests land.
      - name: Build + test Presentation (with coverage gate)
        run: >-
          dotnet test tests/Honua.Collect.Presentation.Tests/Honua.Collect.Presentation.Tests.csproj
          -c Release --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:Include="[Honua.Collect.Presentation]*"
          /p:Threshold=90%2c72
          /p:ThresholdType=line%2cbranch
          /p:ThresholdStat=total
          /p:CoverletOutputFormat=cobertura

  mutation-test:
    # Mutation testing (Stryker.NET) on the Core library — a quality signal that
    # the Core tests actually assert behaviour, not just execute lines. Kept
    # non-blocking (continue-on-error) so it informs without gating, and runs only
    # the Core test project per stryker-config.json. See docs/mutation-testing.md.
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Authenticate package feed
        run: >-
          dotnet nuget update source github-honua
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile NuGet.config

      - name: Install Stryker.NET
        run: dotnet tool install dotnet-stryker --tool-path tools

      - name: Run mutation tests (Core)
        working-directory: tests/Honua.Collect.Core.Tests
        run: ../../tools/dotnet-stryker

  build-app:
    # Compiles the shipping MAUI artifact so a break in the App project fails CI
    # (not just the libraries/tests).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Authenticate package feed
        run: >-
          dotnet nuget update source github-honua
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile NuGet.config

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build Android app
        run: dotnet build src/Honua.Collect.App/Honua.Collect.App.csproj -f net10.0-android -c Release
